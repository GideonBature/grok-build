name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run package

  # @vscode/test-electron smoke — boots a real VS Code, activates the extension, and
  # resolves the webview (missing-CLI onboarding path; no grok binary needed). Covers the
  # host glue the grok-free unit suite can't. Needs a virtual display on Linux (xvfb).
  # Required gate: validated passing against a real Extension Host (VS Code 1.128.0). If a
  # Linux/xvfb-specific quirk ever surfaces here, fix it — don't demote the gate to advisory.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:integration
